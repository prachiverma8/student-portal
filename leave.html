<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="leave.css">
  <script src="leave.js" defer></script>
  <title>Apply for Leave</title>
</head>
<body>
  <h1>Apply for Leave</h1>

  <div class="leave-form-container">
    <form id="leaveForm">
      <label for="leaveType">Leave Type:</label>
      <select id="leaveType" required>
        <option value="">--Select--</option>
        <option value="Sick Leave">Sick Leave</option>
        <option value="Casual Leave">Casual Leave</option>
        <option value="Earned Leave">Earned Leave</option>
      </select>
      <br><br>

      <label for="fromDate">From Date:</label>
      <input type="date" id="fromDate" required>
      <br><br>

      <label for="toDate">To Date:</label>
      <input type="date" id="toDate" required>
      <br><br>

      <label for="reason">Reason:</label><br>
      <textarea id="reason" rows="4" cols="50" placeholder="Enter reason for leave" required></textarea>
      <br><br>

      <button type="submit">Submit</button>
    </form>
  </div>

  <div class="leave-applications">
    <h2>Previous Leave Applications</h2>
    <ul id="leaveList"></ul>
  </div>

  <button id="backBtn">← Back to Dashboard</button>
</body>
</html>
